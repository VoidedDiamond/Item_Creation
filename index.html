<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P21 Item Creator | Hydraquip</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --red:    #bf2027;
      --red-dk: #a31b21;
      --white:  #f5f7fa;
      --gray:   #8a94a6;
      --border: #dce2ed;
      --green:  #1a7f4b;
      --amber:  #b45309;
      --bg:     #eef1f7;
      --card:   #ffffff;
      --text:   #0d1f3c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--red);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    header img.logo {
      height: 44px;
      display: block;
    }

    header .badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 2px 12px rgba(13,31,60,0.07);
      overflow: hidden;
    }

    .card-header {
      background: var(--red);
      padding: 1.25rem 1.75rem;
      border-bottom: 3px solid var(--red-dk);
    }

    .card-header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-header p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.3rem;
    }

    .card-body { padding: 1.75rem; }

    .field { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 0.45rem;
    }

    label .req { color: var(--red); margin-left: 2px; }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s;
      appearance: none;
    }

    input[type="text"]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    input.valid   { border-color: var(--green); }
    input.invalid { border-color: var(--red); }

    .hint {
      font-size: 0.72rem;
      color: var(--gray);
      margin-top: 0.35rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hint.error   { color: var(--red);   font-weight: 600; }
    .hint.success { color: var(--green); font-weight: 600; }
    .hint.warning { color: var(--amber); font-weight: 600; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 1.1rem;
    }

    #dupWarning {
      display: none;
      background: #fff8e1;
      border: 1.5px solid var(--amber);
      border-radius: 4px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
    }

    #dupWarning .dup-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }

    #dupWarning ul { list-style: none; padding: 0; }

    #dupWarning ul li {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      padding: 0.2rem 0;
    }

    #dupWarning .dup-confirm {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
    }

    .submit-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.75rem;
    }

    .btn-primary {
      background: var(--red);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 0.65rem 1.75rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) { background: var(--red-dk); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-reset {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.6rem 1.2rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--gray);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover { border-color: var(--red); color: var(--red); }

    #toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      color: #ffffff;
      padding: 0.85rem 1.25rem;
      border-radius: 5px;
      font-size: 0.85rem;
      border-left: 4px solid var(--red);
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      max-width: 340px;
      z-index: 999;
    }

    #toast.success { border-left-color: var(--green); }
    #toast.error   { border-left-color: var(--red);   }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .api-note {
      font-size: 0.7rem;
      color: var(--gray);
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <img
    class="logo"
    src="https://shop.hydraquip.com/customer/images/theme-logos/logo.jpg?x=eec3f2"
    alt="Hydraquip"
    onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';"
  />
  <span id="logoFallback" style="display:none;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1rem;color:#bf2027;">HYDRAQUIP</span>
  <div class="badge">P21 Internal Tool</div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h1>New Item Entry</h1>
      <p>Validates item ID format against supplier convention before creating in P21.</p>
    </div>
    <div class="card-body">

      <div class="section-label">Supplier</div>

      <div class="field">
        <label for="supplier">Supplier <span class="req">*</span></label>
        <select id="supplier">
          <option value="">Select a supplier...</option>
        </select>
      </div>

      <hr class="divider" />
      <div class="section-label">Item Details</div>

      <div class="field">
        <label for="itemId">Item ID <span class="req">*</span></label>
        <input type="text" id="itemId" placeholder="Enter item ID" disabled />
        <div class="hint" id="itemIdHint">Select a supplier to see format requirements.</div>
      </div>

      <div class="row">
        <div class="field">
          <label for="productGroup">Product Group <span class="req">*</span></label>
          <select id="productGroup" disabled>
            <option value="">Select supplier first...</option>
          </select>
        </div>
        <div class="field">
          <label for="itemDesc">Item Description <span class="req">*</span></label>
          <input type="text" id="itemDesc" placeholder="Short description" disabled />
        </div>
      </div>

      <div class="field">
        <label for="extDesc">Extended Description</label>
        <textarea id="extDesc" rows="2" placeholder="Optional additional detail" disabled style="resize:vertical;"></textarea>
      </div>

      <hr class="divider" />

      <div id="dupWarning">
        <div class="dup-title">Possible Duplicate Items Found</div>
        <ul id="dupList"></ul>
        <label class="dup-confirm">
          <input type="checkbox" id="dupConfirm" />
          I have reviewed these and confirm this is a new item.
        </label>
      </div>

      <div class="submit-area">
        <button class="btn-reset" id="resetBtn" type="button">Clear Form</button>
        <div style="display:flex;align-items:center;gap:1rem;">
          <span class="api-note" id="apiNote"></span>
          <button class="btn-primary" id="submitBtn" type="button" disabled>Create Item in P21</button>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const P21_API_BASE   = 'https://YOUR-P21-INSTANCE/api/v2';
  const SUPPLIERS_FILE = 'suppliers.json';

  let suppliers       = [];
  let currentSupplier = null;
  let dupCheckPassed  = false;
  let hasDuplicates   = false;
  let validationTimer = null;

  async function init() {
    try {
      const res = await fetch(SUPPLIERS_FILE);
      suppliers = await res.json();
      populateSupplierDropdown();
    } catch (e) {
      showToast('Could not load suppliers.json. Make sure it is in the same folder.', 'error');
    }
  }

  function populateSupplierDropdown() {
    const sel = document.getElementById('supplier');
    suppliers.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.supplier_id;
      opt.textContent = `${s.supplier_id} — ${s.supplier_name}`;
      sel.appendChild(opt);
    });
  }

  document.getElementById('supplier').addEventListener('change', function () {
    const id = this.value;
    currentSupplier = suppliers.find(s => s.supplier_id === id) || null;

    const itemId   = document.getElementById('itemId');
    const itemDesc = document.getElementById('itemDesc');
    const extDesc  = document.getElementById('extDesc');
    const pg       = document.getElementById('productGroup');
    const hint     = document.getElementById('itemIdHint');

    resetValidation();

    if (!currentSupplier) {
      [itemId, itemDesc, extDesc, pg].forEach(el => el.disabled = true);
      pg.innerHTML = '<option value="">Select supplier first...</option>';
      hint.textContent = 'Select a supplier to see format requirements.';
      hint.className = 'hint';
      updateSubmitState();
      return;
    }

    [itemId, itemDesc, extDesc, pg].forEach(el => el.disabled = false);
    itemId.value     = '';
    itemId.className = '';

    hint.textContent = `Format: ${currentSupplier.pattern_display}`;
    hint.className   = 'hint';

    pg.innerHTML = '<option value="">Select product group...</option>';
    currentSupplier.product_groups.forEach(g => {
      const opt = document.createElement('option');
      opt.value       = g.id;
      opt.textContent = g.label;
      pg.appendChild(opt);
    });

    updateSubmitState();
  });

  document.getElementById('itemId').addEventListener('input', function () {
    resetDupWarning();
    dupCheckPassed = false;
    if (validationTimer) clearTimeout(validationTimer);

    const input = this;
    const hint  = document.getElementById('itemIdHint');

    input.className  = '';
    hint.textContent = currentSupplier ? `Format: ${currentSupplier.pattern_display}` : '';
    hint.className   = 'hint';
    updateSubmitState();

    if (!currentSupplier || input.value.trim() === '') return;
    validationTimer = setTimeout(() => validateItemId(input), 600);
  });

  document.getElementById('itemId').addEventListener('blur', function () {
    if (validationTimer) clearTimeout(validationTimer);
    if (!currentSupplier || this.value.trim() === '') return;
    validateItemId(this);
  });

  function validateItemId(input) {
    const val   = input.value.trim().toUpperCase();
    input.value = val;
    const hint  = document.getElementById('itemIdHint');
    const regex = new RegExp(currentSupplier.regex);

    if (regex.test(val)) {
      input.className  = 'valid';
      hint.textContent = 'Format looks good.';
      hint.className   = 'hint success';
    } else {
      input.className  = 'invalid';
      hint.textContent = `Invalid format. Expected: ${currentSupplier.pattern_hint}`;
      hint.className   = 'hint error';
    }
    updateSubmitState();
  }

  ['productGroup', 'itemDesc'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateSubmitState);
    document.getElementById(id).addEventListener('input',  updateSubmitState);
  });

  document.getElementById('dupConfirm').addEventListener('change', function () {
    dupCheckPassed = this.checked;
    updateSubmitState();
  });

  function updateSubmitState() {
    const itemIdVal = document.getElementById('itemId').value.trim();
    const pgVal     = document.getElementById('productGroup').value;
    const descVal   = document.getElementById('itemDesc').value.trim();
    const formatOk  = currentSupplier && new RegExp(currentSupplier.regex).test(itemIdVal);
    const allFilled = formatOk && pgVal && descVal;
    const dupOk     = !hasDuplicates || dupCheckPassed;
    document.getElementById('submitBtn').disabled = !(allFilled && dupOk);
  }

  document.getElementById('submitBtn').addEventListener('click', async function () {
    const itemId = document.getElementById('itemId').value.trim();
    if (!dupCheckPassed) {
      const dups = await checkDuplicates(itemId);
      if (dups.length > 0) { showDupWarning(dups); return; }
    }
    await createItem();
  });

  async function checkDuplicates(itemId) {
    const normalized = itemId.replace(/[-.\s]/g, '').toUpperCase();
    console.log(`[STUB] Duplicate check for: ${normalized}`);
    return [];
  }

  async function createItem() {
    const btn = document.getElementById('submitBtn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    document.getElementById('apiNote').textContent = '';

    const payload = {
      item_id:          document.getElementById('itemId').value.trim(),
      item_desc:        document.getElementById('itemDesc').value.trim(),
      extended_desc:    document.getElementById('extDesc').value.trim(),
      product_group_id: document.getElementById('productGroup').value,
      supplier_id:      currentSupplier.supplier_id
    };

    console.log('[STUB] Would POST to P21 API:', payload);
    await new Promise(r => setTimeout(r, 900));
    showToast(`Item ${payload.item_id} created successfully (stub mode).`, 'success');
    document.getElementById('apiNote').textContent = '[stub — not connected to P21 yet]';
    btn.innerHTML = 'Create Item in P21';
    resetForm();
  }

  function showDupWarning(dups) {
    hasDuplicates = true;
    const list = document.getElementById('dupList');
    list.innerHTML = '';
    dups.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      list.appendChild(li);
    });
    document.getElementById('dupWarning').style.display = 'block';
    updateSubmitState();
  }

  function resetDupWarning() {
    hasDuplicates  = false;
    dupCheckPassed = false;
    document.getElementById('dupWarning').style.display = 'none';
    document.getElementById('dupConfirm').checked       = false;
    document.getElementById('dupList').innerHTML        = '';
  }

  function resetValidation() {
    if (validationTimer) clearTimeout(validationTimer);
    const itemId     = document.getElementById('itemId');
    itemId.value     = '';
    itemId.className = '';
    resetDupWarning();
  }

  function resetForm() {
    document.getElementById('supplier').value         = '';
    document.getElementById('itemId').value           = '';
    document.getElementById('itemId').className       = '';
    document.getElementById('itemId').disabled        = true;
    document.getElementById('itemDesc').value         = '';
    document.getElementById('itemDesc').disabled      = true;
    document.getElementById('extDesc').value          = '';
    document.getElementById('extDesc').disabled       = true;
    document.getElementById('productGroup').innerHTML = '<option value="">Select supplier first...</option>';
    document.getElementById('productGroup').disabled  = true;
    document.getElementById('itemIdHint').textContent = 'Select a supplier to see format requirements.';
    document.getElementById('itemIdHint').className   = 'hint';
    resetDupWarning();
    currentSupplier = null;
    updateSubmitState();
  }

  document.getElementById('resetBtn').addEventListener('click', resetForm);

  function showToast(msg, type = 'success') {
    const t         = document.getElementById('toast');
    t.textContent   = msg;
    t.className     = type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4500);
  }

  init();
</script>
</body>
</html>
