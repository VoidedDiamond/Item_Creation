<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P21 Item Creator | Hydraquip</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --red:    #bf2027;
      --red-dk: #a31b21;
      --white:  #f5f7fa;
      --gray:   #8a94a6;
      --border: #dce2ed;
      --green:  #1a7f4b;
      --amber:  #b45309;
      --bg:     #eef1f7;
      --card:   #ffffff;
      --text:   #0d1f3c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--red);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    header img.logo { height: 44px; display: block; }

    header .badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 2px 12px rgba(13,31,60,0.07);
      overflow: hidden;
    }

    .card-header {
      background: var(--red);
      padding: 1.25rem 1.75rem;
      border-bottom: 3px solid var(--red-dk);
    }

    .card-header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-header p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.3rem;
    }

    .card-body { padding: 1.75rem; }

    .field { margin-bottom: 1.3rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    label .req { color: var(--red); margin-left: 2px; }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s;
      appearance: none;
    }

    input[type="text"]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    input.valid   { border-color: var(--green); }
    input.invalid { border-color: var(--red); }

    .hint {
      font-size: 0.72rem;
      color: var(--gray);
      margin-top: 0.35rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hint.error   { color: var(--red);   font-weight: 600; }
    .hint.success { color: var(--green); font-weight: 600; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.4rem 0;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 1rem;
    }

    /* locked field */
    .locked-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .locked-field select { flex: 1; }
    .lock-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray);
      white-space: nowrap;
      font-family: 'IBM Plex Mono', monospace;
    }

    #dupWarning {
      display: none;
      background: #fff8e1;
      border: 1.5px solid var(--amber);
      border-radius: 4px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
    }

    #dupWarning .dup-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }

    #dupWarning ul { list-style: none; padding: 0; }

    #dupWarning ul li {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      padding: 0.2rem 0;
    }

    #dupWarning .dup-confirm {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
    }

    .submit-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.75rem;
    }

    .btn-primary {
      background: var(--red);
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 0.65rem 1.75rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) { background: var(--red-dk); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-reset {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.6rem 1.2rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--gray);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover { border-color: var(--red); color: var(--red); }

    #toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      color: #ffffff;
      padding: 0.85rem 1.25rem;
      border-radius: 5px;
      font-size: 0.85rem;
      border-left: 4px solid var(--red);
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      max-width: 340px;
      z-index: 999;
    }

    #toast.success { border-left-color: var(--green); }
    #toast.error   { border-left-color: var(--red);   }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .api-note {
      font-size: 0.7rem;
      color: var(--gray);
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <img
    class="logo"
    src="https://shop.hydraquip.com/customer/images/theme-logos/logo.jpg?x=eec3f2"
    alt="Hydraquip"
    onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';"
  />
  <span id="logoFallback" style="display:none;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1rem;color:#bf2027;">HYDRAQUIP</span>
  <div class="badge">P21 Internal Tool</div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h1>New Item Entry</h1>
      <p>Validates item ID format against supplier convention before creating in P21.</p>
    </div>
    <div class="card-body">

      <!-- SUPPLIER -->
      <div class="section-label">Supplier</div>
      <div class="field">
        <label for="supplierId">Primary Supplier ID <span class="req">*</span></label>
        <select id="supplierId"></select>
      </div>

      <hr class="divider" />

      <!-- ITEM IDENTITY -->
      <div class="section-label">Item Identity</div>

      <div class="row2">
        <div class="field">
          <label for="itemId">Item ID <span class="req">*</span></label>
          <input type="text" id="itemId" placeholder="Enter item ID" disabled />
          <div class="hint" id="itemIdHint">Select a supplier to see format requirements.</div>
        </div>
        <div class="field">
          <label for="itemDesc">Item Description <span class="req">*</span></label>
          <input type="text" id="itemDesc" placeholder="Short description" disabled />
        </div>
      </div>

      <hr class="divider" />

      <!-- CLASSIFICATION -->
      <div class="section-label">Classification</div>

      <div class="row2">
        <div class="field">
          <label for="productGroup">Product Group ID <span class="req">*</span></label>
          <select id="productGroup" disabled>
            <option value="">Select supplier first...</option>
          </select>
        </div>
        <div class="field">
          <label for="salesGroup">Sales Group ID <span class="req">*</span></label>
          <select id="salesGroup">
            <option value="">Select...</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label for="purchaseDiscount">Purchase Discount Group ID <span class="req">*</span></label>
          <select id="purchaseDiscount">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="field">
          <label for="uom">Unit of Measure <span class="req">*</span></label>
          <select id="uom">
            <option value="EA" selected>EA</option>
            <option value="FT">FT</option>
            <option value="IN">IN</option>
          </select>
        </div>
      </div>

      <hr class="divider" />

      <!-- LOCATION -->
      <div class="section-label">Location</div>

      <div class="field" style="max-width:320px;">
        <label for="locationId">Location ID <span class="req">*</span></label>
        <select id="locationId">
          <option value="110">110 — HYD Houston (default)</option>
          <option value="119">119 — HYD Houston S &amp; R</option>
          <option value="120">120 — HYD Grand Prairie</option>
          <option value="129">129 — HYD Grand Prairie S &amp; R</option>
          <option value="130">130 — HYD San Antonio</option>
          <option value="140">140 — Flint Hydraulics</option>
          <option value="149">149 — HYD Memphis S &amp; R</option>
          <option value="150">150 — HYD Arizona</option>
          <option value="160">160 — HYD Broussard</option>
          <option value="170">170 — HYD Tulsa</option>
          <option value="180">180 — HYD Oklahoma City</option>
          <option value="190">190 — HYD Colorado</option>
          <option value="199">199 — HYD Colorado S &amp; R</option>
          <option value="210">210 — HYD FC Houston</option>
          <option value="211">211 — HYD DC Houston</option>
          <option value="220">220 — HYD FC Grand Prairie</option>
          <option value="230">230 — HYD FC San Antonio</option>
          <option value="240">240 — HYD Memphis FC</option>
          <option value="260">260 — HYD FC Broussard</option>
          <option value="270">270 — HYD FC Tulsa</option>
          <option value="280">280 — HYD FC Oklahoma City</option>
          <option value="290">290 — HYD FC Colorado</option>
          <option value="310">310 — Hydraquip Electric Systems</option>
        </select>
      </div>

      <hr class="divider" />

      <!-- DUPLICATE WARNING -->
      <div id="dupWarning">
        <div class="dup-title">Possible Duplicate Items Found</div>
        <ul id="dupList"></ul>
        <label class="dup-confirm">
          <input type="checkbox" id="dupConfirm" />
          I have reviewed these and confirm this is a new item.
        </label>
      </div>

      <div class="submit-area">
        <button class="btn-reset" id="resetBtn" type="button">Clear Form</button>
        <div style="display:flex;align-items:center;gap:1rem;">
          <span class="api-note" id="apiNote"></span>
          <button class="btn-primary" id="submitBtn" type="button" disabled>Create Item in P21</button>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const P21_API_BASE   = 'https://YOUR-P21-INSTANCE/api/v2';
  const SUPPLIERS_FILE = 'suppliers.json';

  let suppliers       = [];
  let currentSupplier = null;
  let dupCheckPassed  = false;
  let hasDuplicates   = false;
  let validationTimer = null;

  // -------------------------------------------------------
  // STATIC DATA
  // -------------------------------------------------------
  const PRODUCT_GROUPS = [
    'ADAPTALL','AIRWAY','ANCHOR','AQPADAPT','AQPFIT','AQPHOSE','AQPIND','AQPQD',
    'AQPTAGS','AQPX','BANDIT','BEHCLAMP','BN000000','BRENNAN','CAMPBELL','CCPF',
    'COMATROL','DEFAULT','DIXQD','DONFILT','DYNAMIC','EAVACC','EAVDIRV','ETELEM',
    'FFX','GC000000','GEARTEK','HUMQE','HUMVAL','HUSQSO','LINC30','LINC40',
    'LINC475','MAGCPLG','MARMON','MICO','MISC','MISCDEN','MISCHOSE','NORACT',
    'NORFIT','NORSTAT','PE000000','SCHELE','SCHFILT','SDCNTRL','SDLSHT','SDPVG',
    'SDSER40','SDX','STUCIQD','SYNHOSE','VERSA','WA000000','XPLO'
  ];

  const SALES_GROUPS = [
    'ANCHORA','AQPGEN','BRENNANA','COMATROL','DEFAULT','DESCASEA','DIXONA',
    'DIXSTAND','LIST','M99','NEW ITEM','NORGRENC','SCHRDERB','VERSA','VERSAA','WAGOA'
  ];

  const PURCHASE_DISCOUNT_GROUPS = [
    'AEROGEN','ANCHORA','AQPADAP','AQPGEN','AQPIND','BRENNANA','DEFAULT','DESCASEA',
    'DIXONA','DIXQD','DIXSTAND','DONAL B','DPSGEN','DPSGEN2','DPSICS','DPSLSHT',
    'DPSPARTS','DPSPVG','EATON1','EATON2','FAIRPART','FIXDCOST','HUMQE','HUMVAL',
    'HUSCO','LINC40%','LINC47.5','M99','NEW ITEM','NORGRENC','SCHRDERB','SCHROEDR',
    'TUTHILL','VERSA','VERSAA','WAGOA'
  ];

  const ALL_SUPPLIERS = [
    '3','100018','105090','105111','105179','105182','105210','105230','105261',
    '105272','105298','105336','105371','105390','105399','105410','105460','105472',
    '105490','105533','105553','105573','105591','105614','105633','105637','105702',
    '105753','105846','105857','105867','105901','105936','105953','105971','105987',
    '106005','106009','106061','106143','106188','106189','106192','106251','106264',
    '106267','106279','106290','106338','106358','106364','106385','106388','106397',
    '106416','106447','106580','106720','111887','112280','113870','116607','116665',
    '119415','119528','119848','120076','121300','121558','122150','123080','124758',
    '124808','124857','124863','124866','124873','124878','124882','125445','126026',
    '126036','126130','126180','126335','148255','151433','151603','151621','152906',
    '158695','175816','177788','177886','177943','178011','178017','178020','178109',
    '178116','178135','178147','178187','178196','194527','206967','209017','216362',
    '219583'
  ];

  // -------------------------------------------------------
  // INIT
  // -------------------------------------------------------
  function populateSelect(id, items, placeholder) {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    items.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      sel.appendChild(opt);
    });
  }

  async function init() {
    // Static dropdowns
    populateSelect('salesGroup',       SALES_GROUPS,             'Select...');
    populateSelect('purchaseDiscount', PURCHASE_DISCOUNT_GROUPS, 'Select...');

    // Supplier dropdown - all suppliers (IDs only until P21 API wired)
    const supplierSel = document.getElementById('supplierId');
    supplierSel.innerHTML = '<option value="">Select a supplier...</option>';
    ALL_SUPPLIERS.forEach(id => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      supplierSel.appendChild(opt);
    });

    // Default location to 110
    document.getElementById('locationId').value = '110';

    // Load supplier format rules
    try {
      const res = await fetch(SUPPLIERS_FILE);
      suppliers = await res.json();
      // Enhance supplier dropdown labels for known suppliers
      suppliers.forEach(s => {
        const opt = supplierSel.querySelector(`option[value="${s.supplier_id}"]`);
        if (opt) opt.textContent = `${s.supplier_id} — ${s.supplier_name}`;
      });
    } catch (e) {
      console.warn('Could not load suppliers.json');
    }
  }

  // -------------------------------------------------------
  // SUPPLIER CHANGE
  // -------------------------------------------------------
  document.getElementById('supplierId').addEventListener('change', function () {
    const id = this.value;
    currentSupplier = suppliers.find(s => s.supplier_id === id) || null;

    const itemId = document.getElementById('itemId');
    const itemDesc = document.getElementById('itemDesc');
    const pg = document.getElementById('productGroup');
    const hint = document.getElementById('itemIdHint');

    resetValidation();

    if (!id) {
      [itemId, itemDesc, pg].forEach(el => el.disabled = true);
      pg.innerHTML = '<option value="">Select supplier first...</option>';
      hint.textContent = 'Select a supplier to see format requirements.';
      hint.className = 'hint';
      updateSubmitState();
      return;
    }

    [itemId, itemDesc].forEach(el => el.disabled = false);
    itemId.value = '';
    itemId.className = '';

    // Product group: if supplier has specific groups use those, else full list
    pg.disabled = false;
    if (currentSupplier && currentSupplier.product_groups && currentSupplier.product_groups.length) {
      pg.innerHTML = '<option value="">Select product group...</option>';
      currentSupplier.product_groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.label;
        pg.appendChild(opt);
      });
    } else {
      pg.innerHTML = '<option value="">Select product group...</option>';
      PRODUCT_GROUPS.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        pg.appendChild(opt);
      });
    }

    // Format hint
    if (currentSupplier) {
      hint.textContent = `Format: ${currentSupplier.pattern_display}`;
    } else {
      hint.textContent = 'No format rule on file for this supplier — enter carefully.';
    }
    hint.className = 'hint';

    updateSubmitState();
  });

  // -------------------------------------------------------
  // ITEM ID VALIDATION
  // -------------------------------------------------------
  document.getElementById('itemId').addEventListener('input', function () {
    resetDupWarning();
    dupCheckPassed = false;
    if (validationTimer) clearTimeout(validationTimer);

    const input = this;
    const hint  = document.getElementById('itemIdHint');

    input.className  = '';
    hint.textContent = currentSupplier ? `Format: ${currentSupplier.pattern_display}` : 'No format rule on file — enter carefully.';
    hint.className   = 'hint';
    updateSubmitState();

    if (input.value.trim() === '') return;
    validationTimer = setTimeout(() => validateItemId(input), 600);
  });

  document.getElementById('itemId').addEventListener('blur', function () {
    if (validationTimer) clearTimeout(validationTimer);
    if (this.value.trim() === '') return;
    validateItemId(this);
  });

  function validateItemId(input) {
    const val   = input.value.trim().toUpperCase();
    input.value = val;
    const hint  = document.getElementById('itemIdHint');

    if (!currentSupplier) {
      // No format rule - accept anything but warn
      input.className  = 'valid';
      hint.textContent = 'No format rule on file. Verify this ID manually.';
      hint.className   = 'hint warning';
      updateSubmitState();
      return;
    }

    const regex = new RegExp(currentSupplier.regex);
    if (regex.test(val)) {
      input.className  = 'valid';
      hint.textContent = 'Format looks good.';
      hint.className   = 'hint success';
    } else {
      input.className  = 'invalid';
      hint.textContent = `Invalid format. Expected: ${currentSupplier.pattern_hint}`;
      hint.className   = 'hint error';
    }
    updateSubmitState();
  }

  // -------------------------------------------------------
  // OTHER FIELD LISTENERS
  // -------------------------------------------------------
  ['productGroup','salesGroup','purchaseDiscount','uom','locationId'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateSubmitState);
  });
  document.getElementById('itemDesc').addEventListener('input', updateSubmitState);
  document.getElementById('dupConfirm').addEventListener('change', function () {
    dupCheckPassed = this.checked;
    updateSubmitState();
  });

  // -------------------------------------------------------
  // SUBMIT STATE
  // -------------------------------------------------------
  function updateSubmitState() {
    const itemIdVal  = document.getElementById('itemId').value.trim();
    const itemIdEl   = document.getElementById('itemId');
    const pgVal      = document.getElementById('productGroup').value;
    const sgVal      = document.getElementById('salesGroup').value;
    const pdgVal     = document.getElementById('purchaseDiscount').value;
    const uomVal     = document.getElementById('uom').value;
    const locVal     = document.getElementById('locationId').value;
    const descVal    = document.getElementById('itemDesc').value.trim();
    const supplierVal= document.getElementById('supplierId').value;

    const idOk = itemIdVal !== '' && (itemIdEl.className === 'valid');
    const allFilled = supplierVal && idOk && descVal && pgVal && sgVal && pdgVal && uomVal && locVal;
    const dupOk = !hasDuplicates || dupCheckPassed;

    document.getElementById('submitBtn').disabled = !(allFilled && dupOk);
  }

  // -------------------------------------------------------
  // SUBMIT
  // -------------------------------------------------------
  document.getElementById('submitBtn').addEventListener('click', async function () {
    const itemId = document.getElementById('itemId').value.trim();
    if (!dupCheckPassed) {
      const dups = await checkDuplicates(itemId);
      if (dups.length > 0) { showDupWarning(dups); return; }
    }
    await createItem();
  });

  // -------------------------------------------------------
  // DUPLICATE CHECK (stub)
  // -------------------------------------------------------
  async function checkDuplicates(itemId) {
    const normalized = itemId.replace(/[-.\s]/g, '').toUpperCase();
    console.log(`[STUB] Duplicate check for: ${normalized}`);
    // TODO: replace with P21 API call
    return [];
  }

  // -------------------------------------------------------
  // CREATE ITEM (stub)
  // -------------------------------------------------------
  async function createItem() {
    const btn = document.getElementById('submitBtn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    document.getElementById('apiNote').textContent = '';

    const payload = {
      item_id:                   document.getElementById('itemId').value.trim(),
      item_desc:                 document.getElementById('itemDesc').value.trim(),
      product_group_id:          document.getElementById('productGroup').value,
      sales_group_id:            document.getElementById('salesGroup').value,
      purchase_discount_group_id:document.getElementById('purchaseDiscount').value,
      unit_of_measure:           document.getElementById('uom').value,
      location_id:               document.getElementById('locationId').value,
      primary_supplier_id:       document.getElementById('supplierId').value
    };

    console.log('[STUB] Would POST to P21 API:', payload);
    // TODO: replace with real P21 API call
    await new Promise(r => setTimeout(r, 900));
    showToast(`Item ${payload.item_id} created successfully (stub mode).`, 'success');
    document.getElementById('apiNote').textContent = '[stub — not connected to P21 yet]';
    btn.innerHTML = 'Create Item in P21';
    resetForm();
  }

  // -------------------------------------------------------
  // DUP WARNING
  // -------------------------------------------------------
  function showDupWarning(dups) {
    hasDuplicates = true;
    const list = document.getElementById('dupList');
    list.innerHTML = '';
    dups.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      list.appendChild(li);
    });
    document.getElementById('dupWarning').style.display = 'block';
    updateSubmitState();
  }

  function resetDupWarning() {
    hasDuplicates  = false;
    dupCheckPassed = false;
    document.getElementById('dupWarning').style.display = 'none';
    document.getElementById('dupConfirm').checked       = false;
    document.getElementById('dupList').innerHTML        = '';
  }

  // -------------------------------------------------------
  // RESET
  // -------------------------------------------------------
  function resetValidation() {
    if (validationTimer) clearTimeout(validationTimer);
    const itemId     = document.getElementById('itemId');
    itemId.value     = '';
    itemId.className = '';
    resetDupWarning();
  }

  function resetForm() {
    document.getElementById('supplierId').value         = '';
    document.getElementById('itemId').value             = '';
    document.getElementById('itemId').className         = '';
    document.getElementById('itemId').disabled          = true;
    document.getElementById('itemDesc').value           = '';
    document.getElementById('itemDesc').disabled        = true;
    document.getElementById('productGroup').innerHTML   = '<option value="">Select supplier first...</option>';
    document.getElementById('productGroup').disabled    = true;
    document.getElementById('salesGroup').value         = '';
    document.getElementById('purchaseDiscount').value   = '';
    document.getElementById('uom').value                = 'EA';
    document.getElementById('locationId').value         = '110';
    document.getElementById('itemIdHint').textContent   = 'Select a supplier to see format requirements.';
    document.getElementById('itemIdHint').className     = 'hint';
    resetDupWarning();
    currentSupplier = null;
    updateSubmitState();
  }

  document.getElementById('resetBtn').addEventListener('click', resetForm);

  // -------------------------------------------------------
  // TOAST
  // -------------------------------------------------------
  function showToast(msg, type = 'success') {
    const t         = document.getElementById('toast');
    t.textContent   = msg;
    t.className     = type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4500);
  }

  init();
</script>
</body>
</html>
